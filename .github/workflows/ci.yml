name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret-at-least-32-chars-long
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
